name: Rebuild Dressing Room
on:
  schedule:
    - cron: '0 * * * *'        # hourly
  workflow_dispatch: {}          # "Run workflow" button = instant rebuild
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Build from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          OUTPUT_DIR: '.'        # write index.html + images/ to repo root (what Pages serves)
        run: |
          rm -rf images
          python build_dashboard.py
      - name: Commit if changed
        run: |
          git config user.name "dressing-room-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto rebuild"
          git push
